name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Core crate (Rust, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The core crate is UI-agnostic by design (architecture.md §2) and
      # builds without Tauri's platform deps — this job stays cheap.
      - run: cargo test -p salvage-core
      - run: cargo clippy -p salvage-core -- -D warnings
      - run: cargo fmt -p salvage-core --check

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  shell:
    name: Tauri shell (compile check, macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo check -p salvage
