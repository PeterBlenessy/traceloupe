name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: Core crate (Rust, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The core crate is UI-agnostic by design (architecture.md §2) and
      # builds without Tauri's platform deps — this job stays cheap.
      - run: cargo test -p traceloupe-core
      # --all-targets so lints in test code fail CI too (without it, an unused
      # import inside #[cfg(test)] slips through — see issue #12).
      - run: cargo clippy -p traceloupe-core --all-targets -- -D warnings
      - run: cargo fmt -p traceloupe-core --check

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  shell:
    name: Tauri shell (compile check, macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Stage the llama-server sidecar so `bundle.externalBin` resolves — Tauri
      # validates it at cargo-check time. The binary is git-ignored (see
      # docs/safety-scan-sidecar.md); the fast pre-built download satisfies the
      # compile check (a release build uses build-llama-server.sh for a static
      # binary instead).
      - run: bash scripts/download-llama-server.sh
      - run: cargo check -p traceloupe
      # Lint the shell crate too (clippy needs the built `dist/` from pnpm
      # build above, which cargo check also relies on). --all-targets so
      # test-code lints in the Tauri crate are gated, not just the library.
      - run: cargo clippy -p traceloupe --all-targets -- -D warnings
