<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3E4C63"/><stop offset="0.5" stop-color="#1B2536"/><stop offset="1" stop-color="#080C15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.30" cy="0.26" r="0.75">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity="0.30"/><stop offset="1" stop-color="#5EEAD4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F1F5F9"/><stop offset="0.5" stop-color="#AEB9C9"/><stop offset="1" stop-color="#5B6B82"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.42" cy="0.36" r="0.72">
      <stop offset="0" stop-color="#16273F"/><stop offset="1" stop-color="#060B14"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="tglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="iconClip"><rect x="0" y="0" width="1024" height="1024" rx="224"/></clipPath>
    <clipPath id="lens"><circle cx="512" cy="512" r="234"/></clipPath>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <g clip-path="url(#iconClip)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#glow)"/>
    <path d="M 40 512 H 984" fill="none" stroke="#38BDF8" stroke-opacity="0.30" stroke-width="10" stroke-linecap="round"/>
    <path d="M 130 512 l 26 -14 l 26 14 M 812 512 l 26 -16 l 26 16" fill="none" stroke="#38BDF8" stroke-opacity="0.22" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- lens glass -->
  <circle cx="512" cy="512" r="234" fill="url(#glass)"/>

  <!-- magnified trace revealed inside the lens -->
  <g clip-path="url(#lens)">
    <path d="M 300 512 L 356 512 L 392 424 L 434 600 L 480 448 L 528 556 L 580 512
             L 636 512 L 674 560 L 716 460 L 740 512"
          fill="none" stroke="#22D3EE" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#tglow)"/>
    <circle cx="392" cy="424" r="14" fill="#ECFEFF"/>
    <circle cx="528" cy="556" r="12" fill="#ECFEFF"/>
    <circle cx="716" cy="460" r="14" fill="#ECFEFF"/>
    <ellipse cx="430" cy="416" rx="150" ry="94" fill="url(#sheen)" transform="rotate(-28 430 416)"/>
  </g>

  <!-- smooth metal rim (no handle) -->
  <circle cx="512" cy="512" r="250" fill="none" stroke="url(#metal)" stroke-width="34"/>
  <circle cx="512" cy="512" r="233" fill="none" stroke="#060B14" stroke-opacity="0.45" stroke-width="3"/>
  <circle cx="512" cy="512" r="268" fill="none" stroke="#060B14" stroke-opacity="0.25" stroke-width="4"/>
</svg>
