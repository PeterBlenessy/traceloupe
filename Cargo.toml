[workspace]
resolver = "2"
members = ["crates/salvage-core", "src-tauri"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
rusqlite = { version = "0.37", features = ["bundled"] }
plist = "1"
time = { version = "0.3", features = ["serde", "formatting", "parsing"] }
